apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-operator
  template:
    metadata:
      labels:
        app: my-operator
    spec:
      serviceAccountName: my-operator
      containers:
        - name: operator
          image: my-operator:dev
          imagePullPolicy: Never
