apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-operator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-operator
  template:
    metadata:
      labels:
        app: my-operator
    spec:
      serviceAccountName: my-operator
      containers:
        - name: operator
          image: my-operator:dev
          imagePullPolicy: Never
          env:
            - name: OPERATOR_GROUP
              value: "demo.example.com"
            - name: OPERATOR_VERSION
              value: "v1"
            - name: OPERATOR_PLURAL
              value: "webapps"
            - name: SERVICE_TYPE
              value: "ClusterIP"
            - name: RETRY_DELAY
              value: "60"
            - name: MAX_RETRIES
              value: "10"
            - name: RETRY_BACKOFF
              value: "60"
