apiVersion: v1
kind: Service
metadata:
  name: my-operator-metrics
  namespace: default
  labels:
    app: my-operator
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: NodePort
  selector:
    app: my-operator
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP
